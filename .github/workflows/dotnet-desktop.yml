

name: .NET Desktop

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: VideoHarvester.sln
      Project_Path: VideoHarvester\VideoHarvester.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Add MSBuild to the PATH
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: dotnet restore $env:Solution_Name

    # Build the application
    - name: Build the application
      run: dotnet build $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore

    # Execute all unit tests in the solution (if any exist)
    - name: Execute unit tests
      run: dotnet test $env:Solution_Name --configuration ${{ matrix.configuration }} --no-build --verbosity normal
      continue-on-error: true

    # Publish the application
    - name: Publish the application
      if: matrix.configuration == 'Release'
      run: dotnet publish $env:Project_Path --configuration Release --output ./publish --no-build

    # Upload build artifacts
    - name: Upload build artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: VideoHarvester-Release
        path: ./publish

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: VideoHarvester-Release
        path: ./release

    - name: Create ZIP archive
      run: |
        cd release
        zip -r ../VideoHarvester-${{ github.ref_name }}.zip .
        cd ..

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: VideoHarvester-${{ github.ref_name }}.zip
        generate_release_notes: true
        draft: false
        prerelease: false
        name: Release ${{ github.ref_name }}
        body: |
          ## VideoHarvester ${{ github.ref_name }}

          ### Installation
          1. Download the ZIP file below
          2. Extract all files to a folder
          3. Run VideoHarvester.exe

          ### Requirements
          - Windows 10/11
          - .NET 8.0 Runtime Desktop

          ### Changes
          See the automatically generated release notes below.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
